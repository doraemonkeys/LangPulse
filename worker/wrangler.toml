name = "langpulse-worker"
main = "src/index.ts"
compatibility_date = "2025-10-08"

# Local test defaults keep the Worker runnable in Vitest; CI renders
# environment-specific bindings with real Cloudflare database IDs and pushes
# INTERNAL_API_TOKEN as a Worker secret (see .github/workflows/deploy.yml).
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/internal/*"]

[vars]
# Development-only sentinel — production/smoke shadow this with a real secret.
INTERNAL_API_TOKEN = "test-internal-token"
RUN_LEASE_DURATION_SECONDS = "300"

[[d1_databases]]
binding = "DB"
database_name = "langpulse-local"
database_id = "00000000-0000-0000-0000-000000000000"

# Rate limits /api/health to 30 requests/minute per IP to prevent unauthenticated
# clients from hammering the DB via the public health probe.
[[unsafe.bindings]]
name = "HEALTH_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

[env.production]

[env.smoke]
